name: openttd-default

services:
  openttd:
    build:
      context: .
      target: runtime
      dockerfile: ${OPENTTD_DOCKERFILE:-Dockerfile}
      additional_contexts:
        utils: contrib/utils
      args:
        # version;isodate;modified;hash;istag;isstabletag — see README / FindVersion.cmake
        OTTD_REV_OVERRIDE: ${OTTD_REV_OVERRIDE:-15.3;20260404;0;14ec60f248547d4d062a1160f0fc26d742319888;1;1}
    ports:
      # Game server port
      - "3979:3979/tcp"
      - "3979:3979/udp"
      # Admin port
      - "3977:3977/tcp"
    environment:
      - OTTD_USE_RPC_PLUGIN=${OTTD_RPC_PLUGIN:-/opt/openttd/lib/libottd_uds_bridge.so}
      - OTTD_UDS_BRIDGE_ENABLED=1
      - OTTD_UDS_SOCKET_PATH=/run/openttd/rpc.sock
    volumes:
      - openttd-uds:/run/openttd
      - ./contrib/content/scenario/example.scn:/root/.local/share/openttd/content_download/scenario/example.scn
    restart: unless-stopped
    stdin_open: true
    tty: true

  grpc-server:
    build:
      context: contrib/grpc_server
      dockerfile: Dockerfile
      target: runtime
      additional_contexts:
        root-context: .
    depends_on:
      - openttd
    ports:
      - "50051:50051/tcp"
    environment:
      - OTTD_GRPC_ENABLED=1
      - OTTD_GRPC_HOSTNAME=0.0.0.0
      - OTTD_GRPC_PORT=50051
      - OTTD_UDS_SOCKET_PATH=/run/openttd/rpc.sock
    volumes:
      - openttd-uds:/run/openttd
    restart: unless-stopped

  python-controller:
    build:
      context: contrib/python_controller
      dockerfile: Dockerfile
    depends_on:
      - grpc-server
    environment:
      - OTTD_GRPC_HOSTNAME=grpc-server
      - OTTD_GRPC_PORT=50051
      - OTTD_SCENARIO_PATH=example.scn
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  openttd-uds:
