name: Import Git Bundle
on: 
  workflow_dispatch:
    inputs:
      bundle_url:
        description: 'Direct download URL for the Git bundle'
        required: true

permissions:
  contents: write

jobs:
  import-history:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Download the bundle from Google Drive
        run: |
          pip install gdown
          # Put your File ID in the input box when running the action
          gdown  -O repo.bundle "${{ github.event.inputs.bundle_url }}"        

      - name: Verify bundle
        run: git bundle verify repo.bundle
        
      - name: Unpack and push history
        run: |
          # Configure Git for the CI runner
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Fetch the history from the bundle into a new local branch
          git fetch repo.bundle master:imported-master
          
          # Checkout the branch and push it to the GitHub repository
          git checkout imported-master
          git push origin imported-master:master --force