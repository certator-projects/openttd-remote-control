syntax = "proto3";

package openttd;

enum GoalType {
  GT_NONE = 0;
  GT_TILE = 1;
  GT_INDUSTRY = 2;
  GT_TOWN = 3;
  GT_COMPANY = 4;
  GT_STORY_PAGE = 5;
}

// Matches ScriptGoal::QuestionType / GoalQuestionType in OpenTTD.
enum GoalQuestionType {
  GQT_QUESTION = 0;
  GQT_INFORMATION = 1;
  GQT_WARNING = 2;
  GQT_ERROR = 3;
}

service ScriptGoal {
  rpc New(NewGoalRequest) returns (NewGoalReply) {}
  rpc Question(QuestionRequest) returns (QuestionReply) {}
  rpc QuestionClient(QuestionClientRequest) returns (QuestionClientReply) {}
  rpc CloseQuestion(CloseQuestionRequest) returns (CloseQuestionReply) {}
}

message NewGoalRequest {
  int32 company = 1;
  string goal_text = 2;
  GoalType goal_type = 3;
  int64 destination = 4;
  bool goal_global = 5;
}

message NewGoalReply {
  uint32 goal_id = 1;
}

// Ask a question of all players in a company (or all companies when goal_global is true).
message QuestionRequest {
  uint32 unique_id = 1;
  int32 company = 2;
  bool goal_global = 3;
  string question = 4;
  GoalQuestionType type = 5;
  // Bitmask of ScriptGoal::QuestionButton values (e.g. BUTTON_START = 2048).
  uint32 buttons = 6;
}

message QuestionReply {
  bool success = 1;
}

// Ask a question of a single connected client.
message QuestionClientRequest {
  uint32 unique_id = 1;
  uint32 client_id = 2;
  string question = 3;
  GoalQuestionType type = 4;
  uint32 buttons = 5;
}

message QuestionClientReply {
  bool success = 1;
}

// Close a previously shown question on all clients.
message CloseQuestionRequest {
  uint32 unique_id = 1;
}

message CloseQuestionReply {
  bool success = 1;
}
